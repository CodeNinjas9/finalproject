# base noise function: generates like this --->
# sample design/reference design
baseHeight:
  base: 100
  funcs:
       - octaves: 8
          persistence: 0.8
          frequency: 0.003
          low: -2000.0
          high: 3000.0
# rigged noise:
# Mountains
- type: noise
   op: mul
   octaves: 7
   persistence: 0.7
   frequency: 0.002
   low: -13.0
   high: 13.0
   clamp: [0.0, 1.0]
   children:
     - type: noise_ridged
        octaves: 11
        persistence: 0.5
        frequency: 0.03
        low: 0.0
        high: 7500.0
# Peaks
- type: noise_cellular
   octaves: 1
   persistence: 0.6
   frequency: 0.05
   low: -25000.0
   high: 25000.0
# Plateaus
- type: noise_cubed
   op: mul
   octaves: 6
   persistence: 0.6
   frequency: 0.003
   low: -25.0
   high: 25.0
   clamp: [0.0, 1.0]
   children:
     # Tall plateaus
     - type: noise
        octaves: 5
        persistence: 0.55
        frequency: 0.08
        low: -13000.0
        high: 8000.0
        clamp: [0.0, 1500.0]
      # Short plateaus
      - type: noise
        octaves: 5
        persistence: 0.6
        frequency: 0.1
        low: -7000.0
        high: 5000.0
        clamp: [0.0, 750.0]